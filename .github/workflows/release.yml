name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build RipWave.exe
        run: |
          pyinstaller --onefile --windowed `
            --name RipWave `
            --icon assets/icon.ico `
            --add-data "assets/icon.ico;assets" `
            ripwave.py

      - name: Download yt-dlp
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "dist/yt-dlp.exe"

      - name: Download ffmpeg
        run: |
          $tmp = "$env:TEMP\ffmpeg.zip"
          Invoke-WebRequest `
            -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" `
            -OutFile $tmp
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [IO.Compression.ZipFile]::OpenRead($tmp)
          $entry = $zip.Entries | Where-Object { $_.Name -eq "ffmpeg.exe" } | Select-Object -First 1
          [IO.Compression.ZipFileExtensions]::ExtractToFile($entry, "dist/ffmpeg.exe", $true)
          $zip.Dispose()

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
            rolling="false"
          else
            tag="latest"
            version="1.0.0"
            rolling="true"
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "rolling=$rolling"
          } >> "$GITHUB_OUTPUT"

      - name: Build one-click installer (Inno Setup)
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          & "$iscc" "/DMyAppVersion=${{ steps.meta.outputs.version }}" installer\ripwave.iss
          if (-not (Test-Path "installer\RipWave-Setup.exe")) {
            throw "RipWave-Setup.exe was not produced"
          }

      - name: Package portable zip
        run: |
          Compress-Archive -Path dist/* -DestinationPath dist/RipWave-windows.zip

      - name: Move rolling 'latest' tag
        if: steps.meta.outputs.rolling == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const ref = 'tags/latest';
            const sha = context.sha;
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
                sha,
                force: true,
              });
            } catch (err) {
              if (err.status === 422 || err.status === 404) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/${ref}`,
                  sha,
                });
              } else {
                throw err;
              }
            }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.rolling == 'true' && 'RipWave (latest)' || steps.meta.outputs.tag }}
          make_latest: "true"
          prerelease: false
          files: |
            installer/RipWave-Setup.exe
            dist/RipWave-windows.zip
          generate_release_notes: ${{ steps.meta.outputs.rolling == 'false' }}
          body: ${{ steps.meta.outputs.rolling == 'true' && 'Rolling build from latest master — one-click installer RipWave-Setup.exe' || '' }}
